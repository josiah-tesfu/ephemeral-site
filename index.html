<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8" />
  <title>ephemeral</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Forum&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      font-family: 'Forum', serif;
      background: transparent;
      color: white;
      position: relative;
      overflow: hidden;
      font-weight: bold;
    }

    iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      border: none;
      z-index: -1;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 0 3rem;
      position: relative;
      z-index: 1;
      font-size: 2rem;
      margin-top: 8vh;
    }

    header a {
      color: white;
      text-decoration: none;
    }

    .center-title {
      text-align: center;
      font-size: 8rem;
      margin-top: 8vh;
      margin-bottom: 6vh;
      z-index: 1;
      position: relative;
    }

    .bottom-row {
      display: flex;
      justify-content: space-between;
      padding: 0 5rem;
      position: relative;
      z-index: 1;
      font-size: 4rem;
      margin-top: 50vh;
    }

    .bottom-row div {
      white-space: nowrap;
    }

    #playButton {
      background: none;
      border: none;
      color: white;
      font-size: 6rem;
      cursor: pointer;
      animation: throb 1.5s infinite;
      transition: opacity 0.3s ease;
    }

    #playButton.hidden {
      opacity: 0;
      pointer-events: none;
    }

    @keyframes throb {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    /* Mobile Styles */
    @media (max-width: 768px) {
      header {
        display: none;
      }

      .mobile-menu-toggle {
        position: absolute;
        top: 1rem;
        left: 1rem;
        font-size: 6rem;
        background: none;
        border: none;
        color: white;
        cursor: pointer;
        z-index: 10;
      }

      .mobile-menu {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 7rem;
        left: 1rem;
        background: rgba(0, 0, 0, 0.8);
        padding: 1rem 2rem;
        border-radius: 0.5rem;
        z-index: 9;
      }

      .mobile-menu a {
        color: white;
        text-decoration: none;
        font-size: 2.2rem;
        margin: 0.5rem 0;
      }

    .center-title {
      font-size: 5rem;
      margin-top: -2vh;   /* negative to pull closer to animation */
      margin-bottom: 0;
    }

      .bottom-row {
        flex-direction: column;
        align-items: center;
        text-align: center;
        font-size: 2.5rem;
        margin-top: 65vh;      /* was 55vh */
        gap: 1rem;
      }


      .bottom-row div {
        white-space: nowrap;
      }

      body {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <iframe src="animation/dots.html"></iframe>

  <!-- Mobile Menu Button -->
  <button class="mobile-menu-toggle" onclick="toggleMenu()">☰</button>
  <div id="mobileMenu" class="mobile-menu">
    <a href="about.html">ABOUT</a>
    <a href="contact.html">CONTACT</a>
  </div>

  <header>
    <a href="about.html">ABOUT</a>
    <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 0.3rem;">
      <a href="mailto:tesfu.places@gmail.com">tesfu.places@gmail.com</a>
      <a href="#">@tesfu.places</a>
    </div>
  </header>

  <div style="position: relative; display: flex; justify-content: flex-end; padding: 1rem 3rem;">
    <button id="playButton">▶</button>
    <audio id="audioPlayer" src="art-of-life.mp3"></audio>
  </div>

  <div class="bottom-row">
    <div>YORK AV. & YEW ST.</div>
    <div>JULY 5-12</div>
  </div>

  <script>
    const audio = document.getElementById('audioPlayer');
    const button = document.getElementById('playButton');
    const menu = document.getElementById('mobileMenu');

    button.addEventListener('click', () => {
      audio.play();
      button.classList.add('hidden');
    });

    function toggleMenu() {
      if (menu.style.display === 'flex') {
        menu.style.display = 'none';
      } else {
        menu.style.display = 'flex';
      }
    }
  </script>
</body>
</html>

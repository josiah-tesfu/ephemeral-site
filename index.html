<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ephemeral</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Forum&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      font-family: 'Forum', serif;
      background: transparent;
      color: white;
      position: relative;
      overflow: hidden;
      font-weight: bold;
    }

    iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      border: none;
      z-index: -1;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 0 3rem;
      position: relative;
      z-index: 1;
      font-size: 2rem;
      margin-top: 8vh;
    }

    header a {
      color: white;
      text-decoration: none;
    }

    .center-title {
      text-align: center;
      font-size: 8rem;
      margin-top: 8vh;
      margin-bottom: 6vh;
      z-index: 1;
      position: relative;
    }

    .bottom-row {
      display: flex;
      justify-content: space-between;
      padding: 0 5rem;
      position: relative;
      z-index: 1;
      font-size: 4rem;
      margin-top: 60vh;
    }

  @media (max-width: 768px) {
  header {
    flex-direction: column;
    align-items: flex-start;
    gap: 1.2rem;
    padding: 2rem;
    font-size: 2.2rem; /* larger header text */
  }

  .center-title {
    font-size: 5rem; /* optional: larger if needed */
    margin-top: 4vh;  /* move animation up */
    margin-bottom: 2vh;
  }

  .bottom-row {
    flex-direction: column;
    align-items: center;
    text-align: center;
    font-size: 2.5rem;
    margin-top: 55vh; /* closer up */
    gap: 1rem;
  }

  body {
    padding: 1rem;
  }
}

  </style>
</head>
<body>
  <iframe src="animation/dots.html"></iframe>

  <header>
    <a href="about.html">ABOUT THE PROJECT</a>
    <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 0.3rem;">
      <a href="#">tesfu.places@gmail.com</a>
      <a href="#">@tesfu.places</a>
    </div>
  </header>

  <div style="position: relative; display: flex; justify-content: flex-end; padding: 1rem 3rem;">
    <button id="playButton" style="background: none; border: none; color: white; font-size: 2rem; cursor: pointer;">▶</button>
    <audio id="audioPlayer" src="art-of-life.mp3"></audio>
  </div>

  <div class="bottom-row">
    <div>YORK AV. & YEW ST.</div>
    <div>JULY 5-12</div>
  </div>

</body>

<script>
  const audio = document.getElementById('audioPlayer');
  const button = document.getElementById('playButton');

  let playing = false;
  button.addEventListener('click', () => {
    if (!playing) {
      audio.play();
      button.textContent = '⏸';
    } else {
      audio.pause();
      button.textContent = '▶';
    }
    playing = !playing;
  });
</script>

</html>
